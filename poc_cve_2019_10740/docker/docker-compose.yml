name: poc_cve_2019_10740

services:
  greenmail:
    image: greenmail/standalone:2.0.0
    ports:
      - "3025:3025"
      - "3143:3143"
    environment:
      # User syntax: logon:password@domain (see GreenMail -help). Bind all interfaces for other containers.
      GREENMAIL_OPTS: "-Dgreenmail.smtp.hostname=0.0.0.0 -Dgreenmail.smtp.port=3025 -Dgreenmail.imap.hostname=0.0.0.0 -Dgreenmail.imap.port=3143 -Dgreenmail.users=victim:victimpass@localhost,attacker:attackpass@localhost"

  roundcube:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - greenmail
    environment:
      ROUNDCUBE_DEFAULT_HOST: greenmail
      ROUNDCUBE_DEFAULT_PORT: "3143"
      ROUNDCUBE_SMTP_HOST: greenmail
      ROUNDCUBE_SMTP_PORT: "3025"
